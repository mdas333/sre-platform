apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: sre-platform
  labels:
    app.kubernetes.io/name: platform-api
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/component: control-plane
spec:
  # The Platform API is the cluster's control plane; it must not scale to
  # zero. Minimum replicas of 2 also gives rolling-update availability.
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-api
        app.kubernetes.io/part-of: sre-platform
        app.kubernetes.io/component: control-plane
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: platform-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: platform-api
          # Locally-built image imported via `k3d image import`. In CI the
          # same tag is pushed to GHCR and signed with keyless cosign via
          # GitHub OIDC (see shared/adr/0008).
          image: ghcr.io/mdas333/sre-platform/platform-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PLATFORM_API_LOG_LEVEL
              value: INFO
            - name: PLATFORM_API_OTLP_ENDPOINT
              value: http://signoz-otel-collector.signoz.svc.cluster.local:4317
            - name: PLATFORM_API_VAULT_ADDR
              value: http://vault.vault.svc.cluster.local:8200
            - name: PLATFORM_API_VAULT_ROLE
              value: platform-api
            - name: PLATFORM_API_WORKLOAD_NAMESPACE
              value: sre-platform
            - name: ENABLE_LLM_EXPLAIN
              value: "false"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
