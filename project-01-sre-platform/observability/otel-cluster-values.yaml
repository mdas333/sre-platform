# OpenTelemetry Collector — Deployment (singleton) mode.
#
# One replica collects cluster-wide signals that must not be duplicated
# across nodes: K8s object state (pod phases, deployment availability,
# node conditions) and K8s warning/normal events.

mode: deployment

replicaCount: 1

image:
  repository: otel/opentelemetry-collector-k8s
  tag: 0.144.0

presets:
  clusterMetrics:
    enabled: true
  kubernetesEvents:
    enabled: true

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

config:
  exporters:
    otlp/signoz:
      endpoint: signoz-otel-collector.signoz.svc.cluster.local:4317
      tls:
        insecure: true
  service:
    pipelines:
      metrics:
        exporters: [otlp/signoz]
      logs:
        exporters: [otlp/signoz]
